name: 台帳の週次更新(PR作成)

# 日本語版 Wikipedia を情報源に台帳 registry/dramas.json を突合・更新し、
# 変更があれば PR を作成する。人がレビューしてマージすると deploy.yml が
# 配信JSONを再生成して GitHub Pages へデプロイする。
# (直接公開はしない。新規採番・手動作品への紐付け候補を人が確認するため)
# fetch は記事本文から放送休止日(hiatus)も精度優先で抽出し、検出分は
# seed_report.md 経由で PR 本文に列挙する(誤検出がないか人が確認する)。

on:
  # 毎週月曜 18:00 JST(= 09:00 UTC)に再突合。
  schedule:
    - cron: '0 9 * * 1'
  # 手動実行(年を指定可能。未指定なら当年)。
  workflow_dispatch:
    inputs:
      year:
        description: '対象年(空欄なら当年)'
        required: false
        default: ''

# PR 作成に必要な権限。
permissions:
  contents: write
  pull-requests: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # create-pull-request の push と認証ヘッダが二重になり
          # "Duplicate header: Authorization" で失敗するのを防ぐ
          # (PR 作成用のトークンは create-pull-request 側が持つ)。
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 台帳を突合・更新(当年の全クール)
        env:
          SEED_REPORT: ${{ github.workspace }}/seed_report.md
        run: |
          set -euo pipefail
          YEAR="${{ github.event.inputs.year }}"
          if [ -z "$YEAR" ]; then YEAR="$(date +%Y)"; fi
          echo "対象年: $YEAR"
          for cool in winter spring summer autumn; do
            echo "== $YEAR $cool =="
            python3 scripts/fetch_wikipedia_dramas.py "$YEAR" "$cool"
          done

      - name: PR 本文を組み立て
        id: body
        run: |
          {
            echo "Wikipedia を情報源に台帳 \`registry/dramas.json\` を更新しました。"
            echo ""
            echo "マージすると Pages に配信JSONが再デプロイされます。"
            echo "**新規採番/紐付け候補を確認してからマージしてください。**"
            echo ""
            if [ -s seed_report.md ]; then
              cat seed_report.md
            else
              echo "(新規採番・紐付け候補はありません。放送情報の更新のみ)"
            fi
          } > pr_body.md
          echo "path=pr_body.md" >> "$GITHUB_OUTPUT"

      - name: 変更があれば PR を作成
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: registry/dramas.json
          branch: auto/seed-update
          delete-branch: true
          commit-message: 'chore: 台帳を週次更新(Wikipedia 突合)'
          title: '台帳の週次更新'
          body-path: ${{ steps.body.outputs.path }}
